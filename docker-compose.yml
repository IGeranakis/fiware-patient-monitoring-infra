services:
  mongo:
    image: mongo:6.0
    command: --nojournal

  orion:
    image: fiware/orion
    ports:
      - "1026:1026"
    command: -dbURI mongodb://mongo
    depends_on:
      - mongo

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=secret
    volumes:
      - mysql-data:/var/lib/mysql

  cygnus:
    image: fiware/cygnus-ngsi
    restart: always
    ports:
      - "5050:5050"
      - "5080:5080"
    environment:
      - CYGNUS_MYSQL_HOST=mysql
      - CYGNUS_MYSQL_PORT=3306
      - CYGNUS_MYSQL_USER=root
      - CYGNUS_MYSQL_PASS=secret
      - CYGNUS_MYSQL_SERVICE_PORT=5050
      - CYGNUS_MYSQL_DATA_MODEL=dm-by-service-path
      - CYGNUS_LOG_LEVEL=INFO
    depends_on:
      - mysql

volumes:
  mysql-data:
